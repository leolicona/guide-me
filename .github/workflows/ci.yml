name: CI

# Merge gate for every PR into develop or main: install, lint, test, and build both
# workspaces. No deploy, no Cloudflare credentials needed.
on:
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (app)
        run: pnpm lint:app

      - name: Test (api)
        run: pnpm test:api

      - name: Build (api)
        run: pnpm build:api

      - name: Build (app)
        run: pnpm build:app
